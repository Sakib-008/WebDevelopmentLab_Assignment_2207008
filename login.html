<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit2Byte | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Site header and navigation -->
    <header class="site-header">
        <div class="container header-inner">
            <div>
                <p class="eyebrow">KUET</p>
                <h1>Bit2Byte</h1>
                <p class="club-tagline">Software Research &amp; Development Community</p>
            </div>
            <nav aria-label="Primary navigation">
                <ul class="nav-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="events.html">Events</a></li>
                    <li><a href="members.html">Members</a></li>
                    <li><a href="register.html">Register</a></li>
                    <li><a class="active" href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="page-section container">
        <h2 class="section-title">Member Login</h2>
        <div class="form-wrapper">
            <!-- Simple login form with email and password fields -->
            <form action="index.html" method="get">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="login-email" placeholder="name@kuet.ac.bd" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="login-password" placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <button class="submit-button" type="submit">Login</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Bit2Byte, KUET. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
